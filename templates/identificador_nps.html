<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pesquisa NPS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='identificador_nps.css') }}">
</head>

<body>

<div class="card">
    <h1>Pesquisa de NPS</h1>
    <p class="subtitle">
        Sua opinião é essencial para aprimorarmos nossos serviços e fortalecer nossa parceria.
    </p>

    <form method="POST" action="/enviar">
        <div class="form-group">
            <input type="text" name="nome" required placeholder=" ">
            <label>Nome completo</label>
        </div>

        <div class="form-group">
            <input type="text" name="cnpj" required placeholder=" ">
            <label>CNPJ</label>
        </div>

        <div class="form-group">
            <input type="text" name="empresa" required placeholder=" ">
            <label>Nome da empresa</label>
        </div>

        <button type="submit">Iniciar pesquisa</button>
    </form>
</div>

</body>
</html>
